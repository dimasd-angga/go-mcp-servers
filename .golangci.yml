run:
  timeout: 5m
  tests: true
linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - bodyclose
    - sqlclosecheck
    - contextcheck
    - noctx
    - errorlint
    - ineffassign
    - unused
    - misspell
linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  gosec:
    excludes:
      - G104  # noisy; errcheck covers it
      - G306  # 0644 is intentional for user-facing filesystem MCP server
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
