name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcptest
          POSTGRES_PASSWORD: mcptest
          POSTGRES_DB: mcptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Sync workspace
        run: go work sync

      - name: Build all servers
        run: make build-all

      - name: Run tests
        env:
          POSTGRES_TEST_DSN: postgres://mcptest:mcptest@127.0.0.1:5432/mcptest?sslmode=disable
          REDIS_TEST_ADDR: 127.0.0.1:6379
          POSTGRES_DSN: postgres://mcptest:mcptest@127.0.0.1:5432/mcptest?sslmode=disable
          REDIS_ADDR: 127.0.0.1:6379
        run: make test-all

      - name: Smoke tests
        env:
          POSTGRES_DSN: postgres://mcptest:mcptest@127.0.0.1:5432/mcptest?sslmode=disable
          REDIS_TEST_ADDR: 127.0.0.1:6379
        run: make smoke

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: shared
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: servers/filesystem
